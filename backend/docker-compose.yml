version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: sellflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sellflow
      MYSQL_USER: sellflow
      MYSQL_PASSWORD: sellflow
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: sellflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: sellflow-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sellflow-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      - mysql
      - redis
    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data:
